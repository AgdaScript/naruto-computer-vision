<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kagebunshin no jutsu</title>
  <link rel="stylesheet" href="kagebunshin.css" />
</head>
<body>

<div id="scanline"></div>
<div id="vignette"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="combo-flash"></div>

<div id="camera-zone">
  <video id="inputVideo" autoplay muted playsinline></video>
  <canvas id="outputCanvas"></canvas>
</div>

<div id="hud">
  <div id="gesture-zone">
    <div id="gesture-display">
      <div id="gesture-name" class="KAGEBUNSHIN">Kage Bunshin No Jutsu</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

<script src="kagebunshin.js"></script>
</body>
</html>
